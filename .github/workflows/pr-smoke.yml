name: PR Smoke Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  id-token: write

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - run: npm ci
        name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - run: npx playwright install --with-deps
        name: Install Playwright browsers

      - run: npx playwright test --grep @smoke
        name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://automationexercise.com' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Generate Allure HTML report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Prepare reports for GitHub Pages
        run: |
          mkdir -p github-pages/pr-smoke/${{ github.run_number }}/allure-report
          mkdir -p github-pages/pr-smoke/${{ github.run_number }}/playwright-report
          mkdir -p github-pages/pr-smoke/allure-report/latest
          mkdir -p github-pages/pr-smoke/playwright-report/latest
          cp -r allure-report/* github-pages/pr-smoke/${{ github.run_number }}/allure-report/
          cp -r playwright-report/* github-pages/pr-smoke/${{ github.run_number }}/playwright-report/
          cp -r allure-report/* github-pages/pr-smoke/allure-report/latest/
          cp -r playwright-report/* github-pages/pr-smoke/playwright-report/latest/

      - name: Deploy Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github-pages
          keep_files: true

      - name: Add summary
        run: |
          echo "## Smoke Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "| Report Type | URL (Run) | URL (Run: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-smoke/${{ github.run_number }}/allure-report/index.html | Latest: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-smoke/allure-report/latest/index.html |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright Report | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-smoke/${{ github.run_number }}/playwright-report/index.html | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-smoke/playwright-report/latest/index.html |" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-results
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30